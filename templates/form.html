<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Hydrated!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Modern & Attractive Styles */
        body {
            font-family: 'Nunito Sans', sans-serif; /* Modern, readable font */
            background-color: #e3f2fd; /* Light blue-grey background */
            color: #37474f; /* Darker grey text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .dark-mode {
            background-color: #263238; /* Dark blue-grey background */
            color: #eceff1; /* Light grey text */
        }

        .dark-mode .card {
            background-color: #37474f;
            border: 1px solid #455a64;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .dark-mode .form-control,
        .dark-mode .form-select {
            background-color: #455a64;
            color: #eceff1;
            border: 1px solid #546e7a;
        }

        .dark-mode .form-control:focus,
        .dark-mode .form-select:focus {
            border-color: #64ffda; /* Teal accent */
            box-shadow: 0 0 0 0.2rem rgba(100, 255, 218, 0.25);
        }

        .dark-mode .btn-success {
            background-color: #64ffda; /* Teal accent */
            border-color: #64ffda;
            color: #263238;
        }

        .dark-mode .btn-success:hover {
            background-color: #4db6ac;
            border-color: #4db6ac;
        }

        .dark-mode .alert-info {
            background-color: #4db6ac;
            color: #263238;
            border: none;
        }

        .dark-mode h2 {
            color: #eceff1;
        }

        .card {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px; /* Slightly narrower for focus */
            transition: box-shadow 0.3s ease-in-out;
        }

        .card:hover {
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        h2 {
            color: #2979ff; /* Vibrant blue */
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .mb-3 label {
            font-weight: 600;
            color: #3f51b5; /* Another shade of blue */
            margin-bottom: 8px;
            display: block;
        }

        .form-control,
        .form-select {
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 1rem;
            transition: border-color 0.2s ease-in-out;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #2979ff;
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(41, 121, 255, 0.25);
        }

        .btn-success {
            background-color: #2979ff; /* Vibrant blue */
            border-color: #2979ff;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }

        .btn-success:hover {
            background-color: #1e60c9;
            border-color: #1e60c9;
        }

        .alert-info {
            background-color: #bbdefb; /* Light blue */
            color: #1976d2; /* Darker blue */
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .alert-info strong {
            font-weight: 700;
        }

        .error-message {
            color: #f44336; /* Red error color */
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .dark-mode-toggle {
            background: none;
            border: none;
            color: #78909c; /* Light grey for dark mode toggle */
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.3s ease-in-out;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .dark-mode .dark-mode-toggle {
            color: #64ffda; /* Teal for dark mode toggle in dark mode */
        }

        .dark-mode-toggle:hover {
            color: #2979ff;
        }

        /* Custom font */
        @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap');
    </style>
</head>
<body> <button class="dark-mode-toggle" aria-label="Toggle Dark Mode">🌙</button>
    <div class="card">
      <h2 class="mb-4">Hydration Recommendation</h2>
      <form id="hydrationForm">
        <div class="mb-3">
          <label for="city" class="form-label">City</label>
          <input type="text" class="form-control" id="city"/>
          <div id="city-error" class="error-message"></div>
        </div>
  
        <div class="mb-3">
          <label for="age" class="form-label">Age</label>
          <input type="number" class="form-control" id="age" required min="0" max="120"/>
          <div id="age-error" class="error-message"></div>
        </div>
  
        <div class="mb-3">
          <label for="gender" class="form-label">Gender</label>
          <select class="form-select" id="gender" required>
            <option value="">-- Select --</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
          <div id="gender-error" class="error-message"></div>
        </div>
  
        <div class="mb-3">
          <label for="weight" class="form-label">Weight (kg)</label>
          <input type="number" step="0.1" class="form-control" id="weight" required min="0.1"/>
          <div id="weight-error" class="error-message"></div>
        </div>
  
        <div class="mb-3">
          <label for="activity" class="form-label">Activity Level</label>
          <select class="form-select" id="activity" required>
            <option value="">-- Select --</option>
            <option value="Low">Low</option>
            <option value="Moderate">Moderate</option>
            <option value="High">High</option>
          </select>
          <div id="activity-error" class="error-message"></div>
        </div>
  
        <div class="mb-3">
          <label for="temperature" class="form-label">Temperature (°C)</label>
          <input type="number" step="0.1" class="form-control" id="temperature" min="-50" max="60"/>
          <div id="temperature-error" class="error-message"></div>
          <small class="form-text text-muted">Leave blank to fetch based on city.</small>
        </div>
  
        <div class="mb-3">
          <label for="special" class="form-label">Special Needs</label>
          <select class="form-select" id="special">
            <option value="">-- Select --</option>
            <option value="Athlete">Athlete</option>
            <option value="Pregnancy">Pregnancy</option>
            <option value="Kidney Condition">Kidney Condition</option>
            <option value="High Altitude Adaptation">High Altitude Adaptation</option>
            <option value="None">None</option>
          </select>
          <div id="special-error" class="error-message"></div>
        </div>
  
        <button type="submit" class="btn btn-success w-100">Get Recommendation</button>
      </form>
  
      <!-- Optional: Show result message manually using JavaScript -->
      <div id="result" class="alert alert-info mt-4" style="display: none;">
        💧 Recommended Water Intake: <strong id="prediction-value"></strong> liters
      </div>
    </div>

    <script>
        const darkModeToggle = document.querySelector(".dark-mode-toggle");
        const body = document.body;
        const card = document.querySelector(".card"); // Select the card
        const cityInput = document.getElementById("city");
        const ageInput = document.getElementById("age");
        const weightInput = document.getElementById("weight");
        const temperatureInput = document.getElementById("temperature");
        const genderSelect = document.getElementById("gender");
        const activitySelect = document.getElementById("activity");
        const hydrationForm = document.getElementById("hydrationForm");

        // Dark Mode Toggle Logic
        darkModeToggle.addEventListener("click", () => {
            body.classList.toggle("dark-mode");
            localStorage.setItem('darkMode', body.classList.contains('dark-mode')); // Store preference
            darkModeToggle.setAttribute('aria-pressed', body.classList.contains('dark-mode')); // Update aria-pressed
        });

        // Check for saved dark mode preference
        const savedDarkMode = localStorage.getItem('darkMode');
        if (savedDarkMode === 'true') {
            body.classList.add('dark-mode');
            darkModeToggle.setAttribute('aria-pressed', 'true');
        } else {
            darkModeToggle.setAttribute('aria-pressed', 'false');
        }

        // Function to display error messages
        function displayError(elementId, message) {
            const errorDiv = document.getElementById(elementId + "-error");
            if (errorDiv) {
                errorDiv.textContent = message;
            }
            const inputElement = document.getElementById(elementId);
            if (inputElement) {
                inputElement.classList.add("invalid");
            }
        }

        // Function to clear error messages and invalid class
        function clearError(elementId) {
            const errorDiv = document.getElementById(elementId + "-error");
            if (errorDiv) {
                errorDiv.textContent = "";
            }
            const inputElement = document.getElementById(elementId);
            if (inputElement) {
                inputElement.classList.remove("invalid");
            }
        }

        // Event listeners to clear invalid class on input
        cityInput.addEventListener("input", () => clearError("city"));
        ageInput.addEventListener("input", () => clearError("age"));
        weightInput.addEventListener("input", () => clearError("weight"));
        temperatureInput.addEventListener("input", () => clearError("temperature"));
        genderSelect.addEventListener("change", () => clearError("gender"));
        activitySelect.addEventListener("change", () => clearError("activity"));

        // Fetch Temperature on City Blur
        cityInput.addEventListener("blur", async () => {
            const city = cityInput.value.trim();
            const apiKey = ''; // **REPLACE WITH YOUR ACTUAL API KEY**
            const formattedCity = city.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
            const apiUrl = `https://api.openweathermap.org/data/2.5/weather?q=${formattedCity}&units=metric&appid=${apiKey}`;

            const temperatureField = document.getElementById("temperature");

            if (city && temperatureField.value === "") { // Only fetch if city is entered and temperature is blank
                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    if (data.cod === 200) {
                        const temperature = data.main.temp.toFixed(1);
                        temperatureField.value = temperature;
                        clearError("city"); // Clear any previous city errors
                    } else {
                        displayError("city", "Could not fetch weather data for this city. Please check the name or enter temperature manually.");
                        temperatureField.value = ""; // Clear temperature field if fetch fails
                    }
                } catch (error) {
                    console.error("Error fetching weather data:", error);
                    displayError("city", "An error occurred while fetching weather data.");
                    temperatureField.value = ""; // Clear temperature field on error
                }
            }
        });

        // Form Submission Validation
        hydrationForm.addEventListener("submit", (e) => {
            let isValid = true;

            // Validate City (optional, but clear error if previously shown)
            if (cityInput.value.trim()) {
                clearError("city");
            }

            // Validate Age
            const age = parseInt(ageInput.value);
            if (isNaN(age) || age < 0 || age > 120) {
                displayError("age", "Please enter a valid age between 0 and 120.");
                isValid = false;
            } else {
                clearError("age");
            }

            // Validate Gender
            if (!genderSelect.value) {
                displayError("gender", "Please select a gender.");
                isValid = false;
            } else {
                clearError("gender");
            }

            // Validate Weight
            const weight = parseFloat(weightInput.value);
            if (isNaN(weight) || weight <= 0) {
                displayError("weight", "Weight must be a positive number.");
                isValid = false;
            } else {
                clearError("weight");
            }

            // Validate Activity Level
            if (!activitySelect.value) {
                displayError("activity", "Please select an activity level.");
                isValid = false;
            } else {
                clearError("activity");
            }

            // Validate Temperature
            const temperature = parseFloat(temperatureInput.value);
            if (temperatureInput.value.trim() && (isNaN(temperature) || temperature < -50 || temperature > 60)) {
                displayError("temperature", "Please enter a realistic temperature between -50°C and 60°C.");
                isValid = false;
            } else {
                clearError("temperature");
            }

            if (!isValid) {
                e.preventDefault(); // Prevent form submission if invalid
            }
        });
    </script>

</body>
</html>
